name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node
        # The wheel force-includes the React SPA; the hatch build hook runs `npm ci &&
        # npm run build`, so node/npm must be present and pinned for a deterministic build.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg and mpv
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg mpv

      - name: Install dependencies
        # --all-extras installs the optional `web` extra (fastapi/uvicorn/sse-starlette)
        # so the web API tests can run; without it they error on import and abort the run.
        run: uv sync --all-groups --all-extras

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        # Build + ship the React SPA in the wheel (matches the released artifact). Without
        # this flag the hook skips the SPA, which is the base-CLI build path.
        env:
          MEETING_ASR_BUILD_WEB: "1"
        run: uv build
