name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node
        # The wheel includes the React SPA as a build artifact; the hook runs `npm ci &&
        # npm run build`, so node/npm must be present and pinned for a deterministic build.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        # --all-extras installs the optional `web` extra so the web API tests can run.
        run: uv sync --all-groups --all-extras

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        # The published wheel MUST ship the React SPA; this flag makes the hook build it
        # (and fail loudly if npm is missing) rather than silently producing a base wheel.
        env:
          MEETING_ASR_BUILD_WEB: "1"
        run: uv build

      - name: Assert wheel ships the SPA
        # Last gate before PyPI: the hook raises when static is missing from the source
        # tree, but only inspecting the artifact proves the assets landed inside the wheel
        # at the path the server serves from (app/web/static).
        run: unzip -l dist/*.whl | grep -q app/web/static/index.html

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
