[project]
name = "meeting-asr"
version = "0.1.0"
description = "Project-based CLI for Alibaba Cloud DashScope Fun-ASR video transcription."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "dashscope>=1.20.14",
  "oss2>=2.19.1",
  "python-dotenv>=1.0.1",
  "requests>=2.32.3",
  "typer>=0.12.5",
]

[project.scripts]
meeting-asr = "app.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]

[dependency-groups]
dev = [
  "pytest>=9.0.3",
]
